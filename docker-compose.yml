version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: spatial_user
      POSTGRES_PASSWORD: spatial_password
      POSTGRES_DB: spatial_chemistry
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
